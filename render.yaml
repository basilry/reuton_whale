services:
  - name: whalescope-pipeline
    type: cron
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.pipeline.run_all
    envVars:
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: SOLSCAN_API_KEY
        sync: false
      - key: ENABLE_CHAIN_XRP
        sync: false
      - key: XRPSCAN_API_BASE
        sync: false
      - key: ENABLE_CHAIN_TRX
        value: "false"
      - key: TRONGRID_API_KEY
        sync: false
      - key: TRONGRID_API_BASE
        value: "https://api.trongrid.io"
      - key: ENABLE_CHAIN_BTC
        value: "false"
      - key: BTC_INDEXER_BASE
        value: "https://mempool.space/api"
      - key: BTC_INDEXER_KEY
        sync: false
      - key: ENABLE_CHAIN_DOGE
        value: "false"
      - key: DOGE_INDEXER_BASE
        value: "https://api.blockchair.com/dogecoin"
      - key: BLOCKCHAIR_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BROADCAST_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BROADCAST_CHAT
        sync: false
