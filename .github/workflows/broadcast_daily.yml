name: Whale Broadcast Daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: whale-broadcast-daily
  cancel-in-progress: true

jobs:
  broadcast-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Broadcast latest brief
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BROADCAST_BOT_TOKEN: ${{ secrets.TELEGRAM_BROADCAST_BOT_TOKEN }}
          TELEGRAM_BROADCAST_CHAT: ${{ secrets.TELEGRAM_BROADCAST_CHAT }}
          TELEGRAM_BROADCAST_ENABLED: ${{ vars.TELEGRAM_BROADCAST_ENABLED || 'false' }}
          TELEGRAM_BROADCAST_DRY_RUN: ${{ vars.TELEGRAM_BROADCAST_DRY_RUN || 'true' }}
        run: python -m src.pipeline.broadcast_daily
