name: Whale Channel Health

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: whale-channel-health
  cancel-in-progress: true

jobs:
  channel-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Persist channel health snapshot
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BROADCAST_BOT_TOKEN: ${{ secrets.TELEGRAM_BROADCAST_BOT_TOKEN }}
          TELEGRAM_BROADCAST_CHAT: ${{ secrets.TELEGRAM_BROADCAST_CHAT }}
        run: python -m src.pipeline.channel_health
